name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Code checkout
        uses: actions/checkout@v4
      - name: Compile client test
        run: gcc test/tcli.c -o tcli
      - name: Compile server test
        run: gcc test/tsrv.c -o tsrv
      - name: Run server
        run: ./tsrv
      - name: Run client
        run: ./tcli
